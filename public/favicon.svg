<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main background gradient - rich green like the original -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CD964;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#28A745;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle inner highlight -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1a7a2e" flood-opacity="0.35"/>
    </filter>
    <!-- Clip to rounded rect -->
    <clipPath id="roundClip">
      <rect x="4" y="4" width="56" height="56" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square with shadow -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14"
        fill="url(#shineGrad)" clip-path="url(#roundClip)"/>

  <!-- Document body (white card) -->
  <rect x="16" y="13" width="32" height="39" rx="4" ry="4"
        fill="white" opacity="0.97"/>

  <!-- Folded corner ear -->
  <polygon points="36,13 48,13 48,22 36,22" fill="#e8f5e9" opacity="0.9"/>
  <polygon points="36,13 48,22 36,22" fill="#c8e6c9" opacity="0.85"/>

  <!-- Lines on the document -->
  <rect x="20" y="27" width="18" height="2.5" rx="1.25" fill="#4CAF50" opacity="0.85"/>
  <rect x="20" y="33" width="24" height="2.5" rx="1.25" fill="#4CAF50" opacity="0.65"/>
  <rect x="20" y="39" width="20" height="2.5" rx="1.25" fill="#4CAF50" opacity="0.5"/>

  <!-- Subtle border on card for depth -->
  <rect x="16" y="13" width="32" height="39" rx="4" ry="4"
        fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.4"/>
</svg>
